name: Build & Deploy to Azure

on:
  workflow_run:
    workflows: ["Tests Suite", "Security Analysis"]
    types:
      - completed
    branches: [ "main" ]

permissions:
  contents: write
  packages: write
  id-token: write

env:
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}:latest

jobs:
  build-and-deploy:
    name: Build, Version and Deploy
    # Solo ejecuta si los tests y seguridad pasaron exitosamente
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semantic Release (Versioning)
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE }}
          
      - name: Run Snyk Container Security
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ env.DOCKER_IMAGE }}
          args: --file=Dockerfile
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          
      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init
        
      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve -var="docker_image=${{ env.DOCKER_IMAGE }}"
